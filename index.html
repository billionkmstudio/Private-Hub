<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f4f6fa;
  --surface: #ffffff;
  --surface2: #f0f2f7;
  --surface3: #e4e7ef;
  --border: rgba(0,0,0,0.08);
  --border-hi: rgba(0,0,0,0.18);
  --text: #1a1d27;
  --text-dim: #8a8fa8;
  --text-mid: #4a5068;
  --accent-ai: #5b4ee8;
  --accent-ai-dim: rgba(91,78,232,0.10);
  --accent-ai-glow: rgba(91,78,232,0.25);
  --accent-novel: #d4891a;
  --accent-novel-dim: rgba(212,137,26,0.10);
  --accent-novel-glow: rgba(212,137,26,0.25);
  --red: #d93025;
  --green: #1e8a4a;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Serif TC', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background: var(--surface2); }
::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-mid); }

/* ══════════════════════════════
   LOGIN
══════════════════════════════ */
#login-screen {
  min-height: 100vh;
  display: flex; align-items:center; justify-content:center;
  background: linear-gradient(135deg, #eef1fb 0%, #f8f0ee 100%);
  position: relative; overflow:hidden;
}

#login-screen::before {
  content:''; position:absolute; inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 25% 35%, rgba(91,78,232,.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 75% 65%, rgba(212,137,26,.06) 0%, transparent 60%);
}

.login-deco {
  position:absolute; font-family:'Playfair Display', serif;
  font-size:22vw; font-weight:700; color:rgba(0,0,0,.025);
  user-select:none; letter-spacing:-.05em; line-height:1;
  top:50%; left:50%; transform:translate(-50%,-50%);
}

.login-card {
  position:relative; z-index:1;
  width: 90%; max-width: 420px;
  padding: 56px 48px;
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: 0 24px 80px rgba(0,0,0,.08);
  border-radius: 8px;
  text-align: center;
}

.login-logo {
  font-family:'Playfair Display', serif;
  font-size: 2.2rem; font-weight:700;
  color: var(--text); letter-spacing:-.02em;
  margin-bottom: 6px;
}

.login-logo span { color: var(--accent-ai); }

.login-sub {
  font-size: .8rem; color: var(--text-dim);
  letter-spacing: .22em; text-transform: uppercase;
  margin-bottom: 44px;
}

.google-btn {
  width:100%; padding: 14px 24px;
  display:flex; align-items:center; justify-content:center; gap:12px;
  background: var(--surface); color: var(--text);
  border: 1px solid var(--border-hi);
  font-family:'Noto Serif TC', serif;
  font-size: .95rem; font-weight: 600; letter-spacing:.05em;
  cursor:pointer; transition: all .3s ease;
  border-radius: 6px;
  box-shadow: 0 4px 12px rgba(0,0,0,.04);
}

.google-btn:hover {
  background: var(--surface2);
  border-color: var(--accent-ai);
  box-shadow: 0 6px 24px var(--accent-ai-glow);
  transform: translateY(-2px);
}

/* ══════════════════════════════
   APP LAYOUT
══════════════════════════════ */
#app { display:none; min-height:100vh; }

/* ── SIDEBAR ── */
.sidebar { 
  position: fixed; left:0; top:0; bottom:0;
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction:column;
  z-index: 200;
  box-shadow: 2px 0 20px rgba(0,0,0,.03);
}

.sidebar-brand {
  padding: 32px 24px 20px;
  border-bottom: 1px solid var(--border);
}

.brand-name {
  font-family:'Playfair Display', serif;
  font-size: 1.4rem; font-weight:700;
  color: var(--text); letter-spacing:-.02em;
}

.brand-name span { color: var(--accent-ai); }

.brand-sub {
  font-size: .7rem; color: var(--text-dim);
  letter-spacing:.2em; text-transform:uppercase;
  margin-top:4px;
}

.sidebar-nav {
  flex:1; padding: 24px 0;
  overflow-y:auto;
}

.nav-section-label {
  padding: 8px 24px 8px;
  font-size: .65rem; font-weight: 600; letter-spacing:.2em; text-transform:uppercase;
  color: var(--text-dim);
}

.nav-item {
  display:flex; align-items:center; gap:12px;
  padding: 12px 24px;
  font-size: .9rem; color: var(--text-mid);
  cursor:pointer; transition: all .2s;
  border-left: 3px solid transparent;
  user-select:none;
}

.nav-item:hover { background:var(--surface2); color:var(--text); }

.nav-item.active {
  color: var(--text); background: var(--surface2); font-weight: 600;
}

.nav-item.active.ai-nav { border-left-color: var(--accent-ai); color: var(--accent-ai); }
.nav-item.active.novel-nav { border-left-color: var(--accent-novel); color: var(--accent-novel); }

.nav-icon-img { width:22px; height:22px; object-fit:contain; opacity:.65; transition:opacity .2s; filter: grayscale(100%); }
.nav-item:hover .nav-icon-img, .nav-item.active .nav-icon-img { opacity:1; filter: grayscale(0%); }

.nav-badge {
  margin-left:auto;
  padding: 2px 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: .7rem; font-weight: 600;
  border-radius: 12px;
}

.nav-badge.ai { background: var(--accent-ai-dim); color: var(--accent-ai); }
.nav-badge.novel { background: var(--accent-novel-dim); color: var(--accent-novel); }

.sidebar-footer {
  padding: 20px 24px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}

.user-info {
  display:flex; align-items:center; gap:12px;
  margin-bottom: 16px;
}

.user-avatar {
  width: 36px; height: 36px; border-radius:50%;
  border: 2px solid var(--surface2);
  object-fit:cover; background: var(--surface3);
}

.user-name {
  font-size: .85rem; font-weight: 600; color: var(--text);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  flex:1;
}

.logout-btn {
  width:100%; padding: 8px;
  background: transparent; color: var(--text-dim);
  border: 1px solid var(--border); border-radius: 4px;
  font-family:'Noto Serif TC', serif;
  font-size: .8rem; cursor:pointer; transition: all .2s;
  letter-spacing:.05em;
}

.logout-btn:hover { border-color: var(--red); color: var(--red); background: rgba(217,48,37,0.05); }

/* ── MAIN CONTENT ── */
.content {
  margin-left: 240px;
  min-height: 100vh;
  width: calc(100% - 240px);
}

.content-inner {
  max-width: 1600px; /* 控制最大寬度，大螢幕不會無限延伸 */
  margin: 0 auto;
  padding: 40px;
}

/* ── PAGE HEADER ── */
.page-header {
  display:flex; align-items:flex-end; justify-content:space-between;
  margin-bottom: 36px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}

.page-title {
  font-family:'Playfair Display', serif;
  font-size: 2.2rem; font-weight:700;
  color: var(--text); letter-spacing:-.02em;
  line-height:1;
}

.page-title-accent.ai { color: var(--accent-ai); }
.page-title-accent.novel { color: var(--accent-novel); }

.page-subtitle { font-size:.9rem; color:var(--text-dim); margin-top:10px; letter-spacing: 0.05em; }

/* ── STATS ROW ── */
.stats-row {
  display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px; margin-bottom: 36px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  transition: all .3s ease;
  box-shadow: 0 2px 10px rgba(0,0,0,.02);
}

.stat-card:hover { border-color: var(--border-hi); box-shadow: 0 8px 24px rgba(0,0,0,.06); transform: translateY(-2px); }

.stat-num {
  font-family:'JetBrains Mono', monospace;
  font-size: 2.4rem; font-weight:600; line-height:1;
  margin-bottom: 8px;
}

.stat-num.ai { color: var(--accent-ai); }
.stat-num.novel { color: var(--accent-novel); }

.stat-label { font-size:.75rem; font-weight: 600; color:var(--text-dim); letter-spacing:.12em; text-transform:uppercase; }

/* ── TOOLBAR ── */
.toolbar {
  display:flex; align-items:center; gap:16px;
  margin-bottom: 32px; flex-wrap:wrap;
}

.btn-primary {
  padding: 10px 24px;
  font-family:'Noto Serif TC', serif; font-weight: 600;
  font-size: .9rem; letter-spacing:.06em;
  cursor:pointer; transition: all .3s;
  white-space:nowrap; border:none; border-radius: 6px;
}

.btn-primary.ai {
  background: var(--accent-ai); color: #fff;
  box-shadow: 0 4px 12px var(--accent-ai-glow);
}
.btn-primary.ai:hover { box-shadow: 0 6px 20px var(--accent-ai-glow); transform: translateY(-1px); background: #4a3ddb;}

.btn-primary.novel {
  background: var(--accent-novel); color: #fff;
  box-shadow: 0 4px 12px var(--accent-novel-glow);
}
.btn-primary.novel:hover { box-shadow: 0 6px 20px var(--accent-novel-glow); transform: translateY(-1px); background: #bf7813;}

.btn-ghost {
  padding: 10px 20px;
  background: var(--surface); color: var(--text-mid);
  border: 1px solid var(--border); border-radius: 6px;
  font-family:'Noto Serif TC', serif;
  font-size: .9rem; cursor:pointer; transition: all .2s;
  white-space:nowrap;
}

.btn-ghost:hover { border-color:var(--border-hi); color:var(--text); background: var(--surface2); }

.search-input {
  flex:1; min-width:250px;
  padding: 12px 20px;
  background: var(--surface); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  font-family:'Noto Serif TC', serif; font-size:.9rem;
  outline:none; transition: border-color .2s, box-shadow .2s;
}

.search-input:focus { border-color: var(--accent-ai); box-shadow: 0 0 0 3px var(--accent-ai-dim); }
.search-input::placeholder { color: var(--text-dim); }

.filter-select {
  padding: 12px 20px; min-width: 150px;
  background: var(--surface); color: var(--text-mid);
  border: 1px solid var(--border); border-radius: 6px;
  font-family:'Noto Serif TC', serif; font-size:.9rem;
  cursor:pointer; outline:none; transition: border-color .2s;
}

.filter-select:focus { border-color: var(--accent-ai); }

/* ── VIEW TOGGLE ── */
.view-toggle { display:flex; gap:0; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.view-toggle button {
  padding: 10px 16px;
  background: transparent; color: var(--text-dim);
  border: none; cursor:pointer;
  font-size:1.1rem; transition:all .2s;
}
.view-toggle button:hover { color: var(--text); }
.view-toggle button.active { background:var(--surface2); color:var(--text); font-weight: bold; }
.view-toggle button:not(:first-child) { border-left: 1px solid var(--border); }

/* ══════════════════════════════
   MODULE: AI INSIGHTS
══════════════════════════════ */
.insights-grid { 
  width:100%;
  display:grid; 
  /* 優化大螢幕網格比例 */
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 24px;
}

.insight-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor:pointer; transition: all .3s ease;
  position:relative; overflow:hidden;
  display: flex; flex-direction: column; /* 讓內容撐滿等高 */
  height: 100%;
  box-shadow: 0 4px 15px rgba(0,0,0,.02);
}

.insight-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:4px; background: var(--accent-ai);
  opacity:.5; transition: opacity .3s, width .3s;
}

.insight-card:hover { border-color: var(--border-hi); transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,.06); }
.insight-card:hover::before { opacity:1; width: 6px;}

.insight-card-header {
  padding: 20px 24px 12px;
  display:flex; align-items:flex-start; gap:14px;
}

.ai-source-badge {
  padding: 4px 10px; flex-shrink:0;
  font-size: .7rem; font-weight: 600; letter-spacing:.1em;
  text-transform:uppercase;
  font-family:'JetBrains Mono', monospace;
  background: var(--accent-ai-dim);
  border: 1px solid rgba(124,106,247,.3);
  border-radius: 4px;
  color: var(--accent-ai);
}

.insight-title {
  font-size: 1.05rem; font-weight:600;
  color: var(--text); line-height:1.4;
  display:-webkit-box; -webkit-line-clamp:2;
  -webkit-box-orient:vertical; overflow:hidden;
}

.insight-question {
  padding: 0 24px 20px;
  font-size: .85rem; color: var(--text-dim);
  line-height:1.6;
  display:-webkit-box; -webkit-line-clamp:4;
  -webkit-box-orient:vertical; overflow:hidden;
  flex: 1; /* 佔滿剩餘空間，將 footer 推到底部 */
}

.insight-footer {
  padding: 16px 24px;
  display:flex; align-items:center; gap:10px;
  flex-wrap:wrap;
  background: var(--surface2);
  border-top: 1px solid var(--border);
  margin-top: auto; /* 永遠靠底 */
}

.category-tag {
  padding: 3px 10px; border-radius: 4px;
  font-size:.7rem; font-weight: 600; letter-spacing:.05em;
  background: var(--surface);
  border: 1px solid var(--border-hi);
  color: var(--text-mid);
}

.tag-chip {
  padding: 3px 10px; border-radius: 4px;
  font-size:.7rem;
  background: rgba(124,106,247,.08);
  border: 1px solid rgba(124,106,247,.2);
  color: var(--accent-ai);
}

.insight-date {
  margin-left:auto;
  font-family:'JetBrains Mono', monospace;
  font-size:.7rem; color: var(--text-dim);
}

/* ══════════════════════════════
   MODULE: NOVEL MANAGEMENT
══════════════════════════════ */
.novel-grid {
  display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 28px;
}

.novel-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor:pointer; transition: all .3s ease;
  overflow:hidden;
  display: flex; flex-direction: column;
  height: 100%;
  box-shadow: 0 4px 15px rgba(0,0,0,.02);
}

.novel-card:hover {
  border-color: rgba(212,137,26,.4);
  transform: translateY(-6px);
  box-shadow: 0 16px 40px rgba(0,0,0,.1);
}

.novel-cover-wrap {
  width:100%; aspect-ratio:2/3; position:relative;
  overflow:hidden; background: var(--surface2);
}

.novel-cover-img {
  width:100%; height:100%; object-fit:cover;
  transition: transform .5s ease;
}

.novel-card:hover .novel-cover-img { transform: scale(1.08); }

.novel-cover-placeholder {
  width:100%; height:100%;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background: linear-gradient(145deg, var(--surface2), var(--surface3));
  color: rgba(212,137,26,.3);
  font-family:'Playfair Display', serif;
  font-size: 4rem; font-style:italic;
}

.novel-status-badge {
  position:absolute; top:12px; right:12px;
  padding: 4px 10px; border-radius: 4px;
  font-size:.65rem; font-weight: 600; letter-spacing:.1em; text-transform:uppercase;
  font-family:'JetBrains Mono', monospace;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}

.novel-status-badge.writing { background:rgba(124,106,247,.85); color:#fff; }
.novel-status-badge.done { background:rgba(30,138,74,.85); color:#fff; }
.novel-status-badge.hold { background:rgba(74,80,104,.85); color:#fff; }

.novel-card-body { 
  padding: 16px 20px; 
  display: flex; flex-direction: column; flex: 1;
}

.novel-card-title {
  font-size: 1.05rem; font-weight:700; color:var(--text);
  line-height:1.4; margin-bottom:8px;
  display:-webkit-box; -webkit-line-clamp:2;
  -webkit-box-orient:vertical; overflow:hidden;
}

.novel-genre {
  display:inline-block; padding:3px 10px; border-radius: 4px;
  font-size:.7rem; font-weight:600; letter-spacing:.05em;
  background: var(--accent-novel-dim);
  border: 1px solid rgba(232,162,74,.25);
  color: #9c5c00; margin-bottom:12px; align-self: flex-start;
}

.novel-meta-row {
  display:flex; align-items:center; justify-content: space-between;
  padding-top:12px; border-top:1px solid var(--border);
  font-size:.75rem; color:var(--text-dim);
  margin-top: auto; /* 靠底對齊 */
}

.novel-type-badge {
  padding: 2px 8px; border-radius: 4px;
  font-size:.65rem; font-weight: 600; letter-spacing:.05em;
  border: 1px solid var(--border-hi);
  color: var(--text-mid); background: var(--surface2);
}

/* ── LIST VIEW ── */
.insight-list { display:flex; flex-direction:column; gap:12px; width:100%; }

.insight-list-item {
  background: var(--surface); border-radius: 8px;
  border: 1px solid var(--border);
  padding: 16px 24px;
  display:grid; grid-template-columns: 100px 1fr 120px 100px; /* 明確分配寬度 */
  align-items:center; gap:24px;
  cursor:pointer; transition: all .2s ease;
}

.insight-list-item:hover { border-color:var(--accent-ai); box-shadow: 0 4px 15px rgba(0,0,0,.03); transform: translateX(4px); }

.novel-list { display:flex; flex-direction:column; gap:12px; width:100%; }

.novel-list-item {
  background: var(--surface); border-radius: 8px;
  border: 1px solid var(--border);
  padding: 12px 24px;
  display:grid; grid-template-columns: 50px 1fr 120px 100px 100px;
  align-items:center; gap:24px;
  cursor:pointer; transition: all .2s ease;
}

.novel-list-item:hover { border-color:rgba(232,162,74,.4); box-shadow: 0 4px 15px rgba(0,0,0,.03); transform: translateX(4px); }

.novel-list-cover {
  width:50px; aspect-ratio:2/3; border-radius: 4px;
  object-fit:cover; background:var(--surface3); display:block;
}

.novel-list-cover-ph {
  width:50px; aspect-ratio:2/3; border-radius: 4px;
  background:var(--surface2);
  display:flex; align-items:center; justify-content:center;
  color:rgba(232,162,74,.4); font-family:'Playfair Display',serif; font-size:1.2rem;
}

/* ── EMPTY ── */
.empty-state {
  grid-column:1/-1;
  padding: 100px 40px; text-align:center;
  background: var(--surface); border: 1px dashed var(--border-hi); border-radius: 12px;
  color: var(--text-mid);
}

.empty-icon { font-size:4rem; display:block; margin-bottom:20px; filter: grayscale(50%); }
.empty-text { font-size:1.1rem; font-weight: 600;}

/* ══════════════════════════════
   MODALS (擴大寬度以適應大螢幕)
══════════════════════════════ */
.modal-overlay {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(26,29,39,.6); backdrop-filter:blur(6px);
  align-items:center; justify-content:center;
  padding:40px 20px; /* 上下留白，避免貼齊邊緣 */
}

.modal-overlay.open { display:flex; animation: fadeIn 0.2s ease; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--surface);
  border: 1px solid var(--border); border-radius: 12px;
  width:100%; max-width:800px;
  max-height:90vh; /* 允許更高的可視範圍 */
  display: flex; flex-direction: column;
  box-shadow: 0 24px 80px rgba(0,0,0,.2);
  transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.modal-overlay.open .modal { transform: translateY(0); }

.modal.wide { max-width: 1100px; /* 大螢幕最佳化：擴大寬度 */ }

.modal-header {
  padding: 24px 32px;
  border-bottom: 1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  background: var(--surface); border-radius: 12px 12px 0 0;
}

.modal-title {
  font-family:'Playfair Display', serif;
  font-size:1.6rem; font-weight:700; color:var(--text);
}

.modal-close {
  background:var(--surface2); border:none; border-radius: 50%; cursor:pointer;
  color:var(--text-dim); font-size:1.2rem; transition:all .2s;
  width:36px; height:36px; display:flex; align-items:center; justify-content:center;
}

.modal-close:hover { background:var(--border-hi); color:var(--text); transform: rotate(90deg); }

.modal-body { 
  padding: 32px; 
  overflow-y:auto; 
  flex: 1; /* 讓 body 區域可捲動 */
}

/* ── FORM ELEMENTS ── */
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
.form-full { grid-column:1/-1; }

.form-group { display:flex; flex-direction:column; gap:8px; }

.form-label {
  font-size:.8rem; font-weight: 600; letter-spacing:.1em;
  color:var(--text-mid);
}

.form-control {
  padding: 12px 16px; border-radius: 6px;
  background: var(--surface); color: var(--text);
  border: 1px solid var(--border-hi);
  font-family:'Noto Serif TC', serif; font-size:.95rem;
  outline:none; transition: all .2s;
  width:100%;
}

.form-control:focus { border-color:var(--accent-ai); box-shadow: 0 0 0 3px var(--accent-ai-dim); }
.form-control::placeholder { color:var(--text-dim); }

textarea.form-control { resize:vertical; min-height:120px; line-height: 1.6; }

/* Tag input */
.tag-input-wrap {
  display:flex; flex-wrap:wrap; align-items:center; gap:8px;
  padding: 10px 16px; min-height:48px; border-radius: 6px;
  background: var(--surface);
  border: 1px solid var(--border-hi);
  cursor:text; transition: all .2s;
}

.tag-input-wrap:focus-within { border-color:var(--accent-ai); box-shadow: 0 0 0 3px var(--accent-ai-dim); }

.form-tag {
  display:flex; align-items:center; gap:6px;
  padding: 4px 10px; border-radius: 4px;
  background: var(--accent-ai-dim);
  border: 1px solid rgba(124,106,247,.3);
  color: var(--accent-ai); font-size:.8rem; font-weight: 600;
}

.form-tag.novel-tag {
  background: var(--accent-novel-dim);
  border-color: rgba(232,162,74,.3);
  color: #9c5c00;
}

.tag-rm {
  background:none; border:none; cursor:pointer;
  color:inherit; opacity:.6; font-size:.9rem; padding:0; transition: opacity .2s;
}
.tag-rm:hover { opacity:1; }

.tag-text-input {
  border:none; background:transparent; outline:none;
  font-family:'Noto Serif TC', serif; font-size:.95rem;
  color:var(--text); flex:1; min-width:120px;
}

/* Cover upload */
.cover-upload-row {
  display:grid; grid-template-columns:100px 1fr; gap:20px; align-items:center;
}

.cover-thumb {
  width:100px; aspect-ratio:2/3; border-radius: 6px;
  background:var(--surface2);
  display:flex; align-items:center; justify-content:center;
  color:rgba(196,125,30,.3); font-family:'Playfair Display',serif; font-size:2rem;
  border:1px solid var(--border); overflow:hidden;
}

.cover-thumb img { width:100%; height:100%; object-fit:cover; }

.file-upload-zone {
  border: 2px dashed var(--border-hi); border-radius: 8px;
  padding: 30px 20px; text-align:center;
  cursor:pointer; background:var(--surface);
  transition: all .2s; position:relative;
}

.file-upload-zone:hover { border-color:var(--accent-novel); background: var(--accent-novel-dim); }
.file-upload-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; }
.file-upload-hint { font-size:.9rem; font-weight: 600; color:var(--text-mid); }
.file-name-display { font-size:.8rem; color:var(--accent-novel); margin-top:8px; font-weight: 600; }

/* Checkbox/radio groups */
.toggle-group { display:flex; border-radius: 6px; overflow: hidden; border: 1px solid var(--border-hi); }
.toggle-opt { flex:1; }
.toggle-opt input { display:none; }
.toggle-opt label {
  display:block; text-align:center; padding:12px;
  background: var(--surface); cursor:pointer;
  font-size:.9rem; font-weight: 600; color:var(--text-mid);
  transition:all .2s;
}
.toggle-opt:not(:first-child) label { border-left:1px solid var(--border-hi); }
.toggle-opt input:checked + label {
  background: var(--surface2); color:var(--text); box-shadow: inset 0 2px 4px rgba(0,0,0,.05);
}

.check-group { display:flex; flex-wrap:wrap; gap:10px; }
.check-opt input { display:none; }
.check-opt label {
  display:block; padding:8px 16px; border-radius: 20px;
  border:1px solid var(--border-hi); background: var(--surface); cursor:pointer;
  font-size:.85rem; font-weight:600; color:var(--text-mid); transition:all .2s;
}
.check-opt input:checked + label {
  background:var(--text); color:var(--surface);
  border-color:var(--text);
}

.form-footer {
  display:flex; justify-content:flex-end; gap:16px;
  margin-top:32px; padding-top:24px;
  border-top:1px solid var(--border);
}

/* Delete */
.btn-danger {
  padding: 8px 16px; border-radius: 6px;
  background:transparent; border:1px solid rgba(217,48,37,.3);
  color:var(--red); font-size:.85rem; font-family:'Noto Serif TC',serif; font-weight: 600;
  cursor:pointer; transition:all .2s;
}
.btn-danger:hover { background:var(--red); color:#fff; }

/* ── DETAIL MODAL ── */
.detail-header {
  display:grid; grid-template-columns:180px 1fr; gap:32px;
  margin-bottom:32px; align-items: start;
}

.detail-cover {
  width:180px; aspect-ratio:2/3; border-radius: 8px;
  object-fit:cover; border:1px solid var(--border); box-shadow: 0 8px 24px rgba(0,0,0,.1);
}

.detail-cover-ph {
  width:180px; aspect-ratio:2/3; border-radius: 8px;
  background:var(--surface2);
  display:flex; align-items:center; justify-content:center;
  color:rgba(232,162,74,.25); font-family:'Playfair Display',serif;
  font-size:3rem; border:1px solid var(--border);
}

.detail-title {
  font-family:'Playfair Display', serif;
  font-size:2rem; font-weight:700; line-height:1.2;
  margin-bottom:16px; color: var(--text);
}

.detail-section { margin-top:24px; background: var(--surface2); padding: 24px; border-radius: 8px; }

.detail-section-label {
  font-size:.75rem; font-weight: 600; letter-spacing:.15em; text-transform:uppercase;
  color:var(--text-dim); margin-bottom:12px;
}

.detail-text {
  font-size:1rem; color:var(--text-mid); line-height:1.8;
}

.detail-actions {
  display:flex; justify-content:flex-end; gap:16px;
  margin-top:32px; padding-top:24px;
  border-top:1px solid var(--border);
}

/* ── AI Detail ── */
.ai-detail-q {
  background: var(--surface); border-radius: 6px;
  border-left: 4px solid var(--accent-ai);
  padding: 20px 24px;
  font-size:1rem; font-weight: 600; color:var(--text); line-height:1.6;
  margin-bottom:20px; box-shadow: 0 2px 8px rgba(0,0,0,.02);
}

.ai-detail-a {
  font-size:1rem; color:var(--text-mid); line-height:1.9;
  white-space: pre-wrap;
}

/* ── CONFIG BANNER ── */
.config-banner {
  background:rgba(217,48,37,.1); border:1px solid rgba(217,48,37,.3); border-radius: 8px;
  padding:16px 24px; margin-bottom:32px;
  font-size:.9rem; font-weight: 600; color:var(--red);
  display:flex; align-items:center; gap:12px;
}

/* ── LOADING + TOAST ── */
.loading-overlay {
  position:fixed; inset:0; z-index:2000;
  background:rgba(255,255,255,.8); backdrop-filter: blur(4px);
  display:none; align-items:center; justify-content:center;
}

.spinner {
  width:40px; height:40px;
  border: 4px solid rgba(124,106,247,.2);
  border-top-color: var(--accent-ai);
  border-radius:50%;
  animation: spin .8s linear infinite;
}

@keyframes spin { to { transform:rotate(360deg); } }

.toast {
  position:fixed; bottom:32px; left: 50%; z-index:3000;
  padding: 14px 28px; border-radius: 30px;
  background: #2a2d3b; color: #fff; font-weight: 600;
  font-size:.95rem; box-shadow: 0 10px 30px rgba(0,0,0,.2);
  transform: translate(-50%, 80px); opacity:0;
  transition: all .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.toast.show { transform: translate(-50%, 0); opacity:1; }

/* ── FILE ITEM ── */
.file-item {
  display:flex; align-items:center; gap:12px;
  padding: 12px 16px; border-radius: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size:.9rem; transition: border-color .2s;
}
.file-item:hover { border-color: var(--border-hi); }

.file-item-name { flex:1; color:var(--text); font-weight: 600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.file-item-size { color:var(--text-dim); font-family:'JetBrains Mono',monospace; font-size:.8rem; flex-shrink:0; }
.file-item-icon { font-size:1.2rem; flex-shrink:0; }

.file-item-rm {
  background:var(--surface2); border:none; border-radius: 4px; cursor:pointer;
  color:var(--text-dim); font-size:1rem; width: 28px; height: 28px;
  transition:all .2s; flex-shrink:0; display: flex; align-items: center; justify-content: center;
}
.file-item-rm:hover { color:var(--surface); background: var(--red); }

.btn-dl {
  display:inline-flex; align-items:center; gap:6px;
  padding: 6px 14px; border-radius: 4px;
  background: var(--surface2); color: var(--text-mid); font-weight: 600;
  font-size:.8rem; text-decoration:none;
  transition: all .2s; cursor:pointer; font-family:'Noto Serif TC',serif;
}
.btn-dl:hover { background:var(--accent-novel); color:var(--surface); }

/* ── RESPONSIVE ── */
@media (max-width:1000px) {
  .form-grid { grid-template-columns:1fr; }
  .detail-header { grid-template-columns: 140px 1fr; gap: 20px; }
}

@media (max-width:768px) {
  .sidebar { width:70px; }
  .brand-sub, .user-name, .nav-section-label, .nav-item span { display:none; }
  .nav-badge { display:none; }
  .nav-item { justify-content:center; padding:16px; border-left: none; border-bottom: 3px solid transparent;}
  .nav-item.active { border-left: none; border-bottom-color: var(--accent-ai); }
  .nav-item.active.novel-nav { border-bottom-color: var(--accent-novel); }
  .nav-icon { width:auto; margin:0; }
  .sidebar-footer { padding:16px 12px; }
  .sidebar-brand { padding:24px 12px; text-align:center; }
  .brand-name { font-size:.9rem; }
  .content { margin-left:70px; width: calc(100% - 70px); }
  .content-inner { padding: 24px 20px; }
  .stats-row { grid-template-columns:repeat(2,1fr); }
  .detail-header { grid-template-columns:1fr; text-align: center; }
  .detail-cover, .detail-cover-ph { margin: 0 auto; }
  .cover-upload-row { grid-template-columns:1fr; }
  .insight-list-item, .novel-list-item { grid-template-columns: 1fr; gap: 12px; }
  .novel-list-cover { display: none; }
}

@media (max-width:480px) {
  .insights-grid { grid-template-columns:1fr; }
  .novel-grid { grid-template-columns:1fr; }
  .stats-row { grid-template-columns:1fr; }
  .modal-overlay { padding: 0; }
  .modal { height: 100vh; max-height: 100vh; border-radius: 0; }
  .modal-header { border-radius: 0; }
}
</style>
